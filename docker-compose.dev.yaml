# 本地开发用 - 仅启动依赖服务（MongoDB, Redis）
# 使用方式: docker-compose -f docker-compose.dev.yaml up -d

services:
  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: tower_redis_dev
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - tower_redis_data_dev:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # MongoDB 数据库
  mongodb:
    image: mongo:6
    container_name: tower_mongodb_dev
    ports:
      - "27017:27017"
    volumes:
      - tower_mongodb_data_dev:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  tower_redis_data_dev:
    driver: local
  tower_mongodb_data_dev:
    driver: local