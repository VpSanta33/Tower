Name: task.rpc
ListenOn: 0.0.0.0:9000
MaxRecvMsgSize: 104857600
MaxSendMsgSize: 104857600

Log:
  Level: info
  Stat: false
  Mode: console
  Encoding: plain
  TimeFormat: "15:04:05"
  
Mongo:
  Uri: "${TOWER_MONGO_URI}"
  DbName: "tower"

RedisConf:
  Host: "${TOWER_REDIS_HOST}"
  Pass: "${TOWER_REDIS_PASS}"
  Type: node
